<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Panel – เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #0d0e10;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    width: 100%;
    max-width: 380px;
  }
  .logo { font-size: 28px; font-weight: 700; color: #5865f2; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #7d8590; margin-bottom: 36px; }
  .btn-discord {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #5865f2;
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s;
    width: 100%;
    justify-content: center;
  }
  .btn-discord:hover { background: #4752c4; }
  .discord-icon { width: 24px; height: 24px; }
  .error-msg {
    background: #3d1515;
    border: 1px solid #7d1e1e;
    color: #f78166;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖 BOT PANEL</div>
  <div class="sub">Discord Bot Dashboard</div>
  <div class="error-msg" id="err-msg"></div>
  <a class="btn-discord" href="/auth/login">
    <svg class="discord-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
    </svg>
    เข้าสู่ระบบด้วย Discord
  </a>
</div>
<script>
  const err = new URLSearchParams(window.location.search).get('error');
  if (err) {
    const msg = {
      not_admin: '❌ คุณไม่ใช่แอดมินในเซิร์ฟเวอร์',
      token_failed: '❌ OAuth token ล้มเหลว กรุณาลองใหม่',
      oauth_error: '❌ เกิดข้อผิดพลาด กรุณาลองใหม่',
    }[err] || '❌ เกิดข้อผิดพลาด: ' + err;
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
